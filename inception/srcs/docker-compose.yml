services:
    mariadb:
        image: mariadb
        container_name: mariadb
        build:
            context: ./requirements/mariadb
            dockerfile: Dockerfile
        volumes:
            - db_data:/var/lib/mysql
        restart: on-failure
        networks:
            - inception_net
        env_file:
            - .env
        secrets:
            - db_password
            - db_root_password

    wordpress:
        image: wordpress
        container_name: wordpress
        build:
            context: ./requirements/wordpress
            dockerfile: Dockerfile
        volumes:
            - www_data:/var/www/html
        restart: on-failure
        networks:
            - inception_net
        depends_on:
            - mariadb
        env_file:
            - .env
        secrets:
            - db_password
            - wp_admin_password
            - wp_user_password

    nginx:
        image: nginx
        container_name: nginx
        build:
            context: ./requirements/nginx
            dockerfile: Dockerfile
        ports:
            - "443:443"
        volumes:
            - www_data:/var/www/html:ro
        restart: on-failure
        networks:
            - inception_net
        depends_on:
            - wordpress

volumes:
    db_data:
        driver: local
        driver_opts:
            type: none
            device: /home/nbonnet/data/db
            o: bind
    www_data:
        driver: local
        driver_opts:
            type: none
            device: /home/nbonnet/data/www
            o: bind

networks:
    inception_net:
        driver: bridge

secrets:
    db_password:
        file: ../secrets/db_password.txt
    db_root_password:
        file: ../secrets/db_root_password.txt
    wp_admin_password:
        file: ../secrets/wp_admin_password.txt
    wp_user_password:
        file: ../secrets/wp_user_password.txt
